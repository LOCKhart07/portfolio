[build]
  command = "npm run build"
  publish = "build"

# Handle Single Page Application routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "24.15.0"

# Start of Selection
# Enable CORS headers for all routes
[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept, Authorization"
# End of Selection

# Agent discovery: advertise machine-readable resources on the homepage
# response (RFC 8288 Link header, RFC 9727 API Catalog). The SPA rewrite
# serves /index.html for "/", so set the header on both request paths.
[[headers]]
  for = "/"
    [headers.values]
    Link = '</.well-known/api-catalog>; rel="api-catalog", </sitemap.xml>; rel="describedby"'

[[headers]]
  for = "/index.html"
    [headers.values]
    Link = '</.well-known/api-catalog>; rel="api-catalog", </sitemap.xml>; rel="describedby"'

# Serve the RFC 9727 API Catalog with its registered media type
[[headers]]
  for = "/.well-known/api-catalog"
    [headers.values]
    Content-Type = "application/linkset+json"

# Markdown for Agents: an edge function does Accept-based content
# negotiation on the homepage. `Accept: text/markdown` -> markdown;
# anything else falls through to the SPA HTML. Edge functions run before
# the SPA rewrite, so this intercepts "/" cleanly.
[[edge_functions]]
  path = "/"
  function = "markdown"

[[edge_functions]]
  path = "/index.html"
  function = "markdown"